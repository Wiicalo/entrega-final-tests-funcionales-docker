services:
  app:
    container_name: be3_77325_app
    build:
      context: .
      dockerfile: Dockerfile
    image: be3_77325:latest
    ports:
      - "5050:5050"
    environment:
      NODE_ENV: production
      PORT: 5050
      LOG_LEVEL: info
    volumes:
      - ./src/logs:/app/logs
    restart: unless-stopped
